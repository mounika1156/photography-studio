<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LensRent - Photography Rental</title>
  <link rel="stylesheet" href="dashboard.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">




</head>
<body>





<section>

<div class="dashboard">

  
  <div class="sidebar">
    <h2>LensRent</h2>

    <button class="active" onclick="showPage('dashboard', this)">Dashboard</button>
    <button onclick="showPage('bookings', this)">Bookings</button>
    <button onclick="showPage('rentals', this)">Rentals</button>
    <button onclick="showPage('payments', this)">Payments</button>
    <button onclick="toggleTheme()">Toggle Theme</button>
  </div>

  
  <div class="main">

    
    <div id="dashboard" class="page active">

      <div class="cards">
        <div class="card">
          <h3>Total Bookings</h3>
          <h2>142</h2>
        </div>

        <div class="card">
          <h3>Active Rentals</h3>
          <h2>9</h2>
        </div>

        <div class="card">
          <h3>Pending Payments</h3>
          <h2>₹18,200</h2>
        </div>
      </div>

      <section class="dashboard-section">
        <div class="section-header">
          <h2>Upcoming Returns</h2>
          <a href="#">View All</a>
        </div>

        <div class="returns-list">

          <div class="return-item">
            <div class="return-info">
              <h3>Canon EOS R5</h3>
              <p>Customer: Arjun Kumar</p>
            </div>
            <div>
              <span class="return-date">16 May 2026</span>
              <span class="status due-soon">Due Soon</span>
            </div>
          </div>

          <div class="return-item">
            <div class="return-info">
              <h3>Sony A7 III</h3>
              <p>Customer: Priya Sharma</p>
            </div>
            <div>
              <span class="return-date">17 May 2026</span>
              <span class="status on-time">On Time</span>
            </div>
          </div>

          <div class="return-item">
            <div class="return-info">
              <h3>24-70mm Lens</h3>
              <p>Customer: Rahul Verma</p>
            </div>
            <div>
              <span class="return-date">18 May 2026</span>
              <span class="status extended">Extended</span>
            </div>
          </div>

        </div>
      </section>

 
      


      
        
      
      
  

  


<script>

  const themeBtn = document.getElementById("themeBtn");

  themeBtn.addEventListener("click", () => {
    document.body.classList.toggle("light");

    if(document.body.classList.contains("light")){
      themeBtn.innerHTML = "☀️";
    } else {
      themeBtn.innerHTML = "🌙";
    }
  });



  const rtlBtn = document.getElementById("rtlBtn");

  rtlBtn.addEventListener("click", () => {
    const html = document.documentElement;

    if(html.getAttribute("dir") === "ltr"){
      html.setAttribute("dir","rtl");
    } else {
      html.setAttribute("dir","ltr");
    }
  });

</script>

</body>
</html>
